<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Quiniela Mundial 2026 · Kapital Partners</title>
<style>
  :root{
    --bg:#06141d; --bg2:#0D2433; --card:#0c1f2b; --card2:#102835; --line:#1d3a47;
    --txt:#eaf2fa; --muted:#8fb0ad; --accent:#00DA9B; --accent2:#00B885; --accentd:#0D2433;
    --gold:#ffcf5c; --silver:#cfd8e3; --bronze:#e0925a; --danger:#ff5d6c; --warn:#ffb020; --blue:#4aa3ff; --purple:#9b8cff;
    --r:16px; --rs:11px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:auto;-webkit-text-size-adjust:100%}
  body{overscroll-behavior-y:none}
  body{background:
      radial-gradient(900px 500px at 15% -8%,rgba(0,230,168,.10),transparent 60%),
      radial-gradient(900px 500px at 100% 0%,rgba(0,218,155,.10),transparent 55%),
      linear-gradient(180deg,#0a1320,#06080c 40%);
    color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;padding-bottom:92px;-webkit-tap-highlight-color:transparent}
  header{position:sticky;top:0;z-index:50;background:rgba(6,8,12,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);-webkit-backface-visibility:hidden;backface-visibility:hidden;
    border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px}
  header .logo{font-size:1.4rem}
  header h1{font-size:1rem;margin:0;font-weight:800;letter-spacing:.2px}
  .who{margin-left:auto;display:flex;align-items:center;gap:8px;background:#11202e;border:1px solid var(--line);
    border-radius:999px;padding:4px 6px 4px 10px;cursor:pointer}
  .who .nm{font-size:.8rem;font-weight:700;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#0a121b;border:1px solid var(--line);font-size:1rem}
  main{max-width:820px;margin:0 auto;padding:16px}
  h2{font-size:1.25rem;margin:0 0 4px;font-weight:800;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:.85rem;margin:0 0 14px}
  h3{font-size:.8rem;margin:20px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:8px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .grow{flex:1}.right{margin-left:auto}.center{text-align:center}
  .muted{color:var(--muted)}.tiny{font-size:.78rem;color:var(--muted)}
  .wrap{flex-wrap:wrap}
  input,select,textarea{background:#0a121b;border:1px solid var(--line);color:var(--txt);border-radius:var(--rs);padding:11px 12px;font-size:.95rem;width:100%;outline:none}
  input:focus,select:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(0,218,155,.20)}
  .score{width:56px;text-align:center;font-size:1.1rem;font-weight:800;padding:8px}
  label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--rs);font-weight:700;padding:11px 14px;font-size:.9rem;transition:transform .05s,opacity .15s,background .15s}
  button:active{transform:scale(.97)}
  .btn{background:#17222f;color:var(--txt);border:1px solid var(--line)}
  .btn.primary{background:linear-gradient(95deg,var(--accent),var(--accent2));color:#04130f}
  .btn.gold{background:linear-gradient(95deg,#ffd86b,#f0a93a);color:#2a1d04}
  .btn.ghost{background:transparent;border:1px solid var(--line)}
  .btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
  .btn.sm{padding:7px 11px;font-size:.8rem}.btn.block{width:100%}
  .badge{display:inline-block;font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:999px;background:#17222f;border:1px solid var(--line)}
  .badge.gold{border-color:var(--gold);color:var(--gold)}.badge.accent{border-color:var(--accent2);color:var(--accent)}
  .badge.live{border-color:var(--danger);color:var(--danger)}.badge.lock{border-color:var(--warn);color:var(--warn)}
  .badge.blue{border-color:var(--blue);color:var(--blue)}
  .avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:800;background:#11202e;border:1px solid var(--line);font-size:1.15rem;flex:none}
  .avatar.lg{width:72px;height:72px;font-size:2rem}
  .avatar.sm{width:30px;height:30px;font-size:.95rem}
  .hero{background:linear-gradient(135deg,#0e2a3d,#0a1726);border:1px solid var(--line);border-radius:20px;padding:18px;position:relative;overflow:hidden}
  .hero:after{content:"🏆";position:absolute;right:-10px;top:-18px;font-size:7rem;opacity:.07}
  .hero .pos{font-size:3rem;font-weight:900;line-height:1;background:linear-gradient(90deg,var(--accent),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
  nav.tabs{position:fixed;bottom:0;left:0;right:0;background:#06080c;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);-webkit-backface-visibility:hidden;backface-visibility:hidden;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:7px 4px;z-index:50}
  nav.tabs button{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.6rem;font-weight:700;padding:5px 2px;flex:1}
  nav.tabs button .ic{font-size:1.2rem}
  nav.tabs button[aria-current="true"]{color:var(--accent)}
  .rowcard{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:var(--rs);margin-bottom:8px;background:var(--card);color:var(--txt)}
  .rowcard.me{outline:2px solid var(--accent)}
  .rowcard.leader{border-color:var(--gold);box-shadow:0 0 22px rgba(255,207,92,.13)}
  .pos2{font-weight:900;width:26px;text-align:center}
  .bar{height:9px;border-radius:999px;background:#0a121b;overflow:hidden;margin-top:6px}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .pts{font-weight:900;margin-left:auto;font-size:1.05rem}
  .delta{font-size:.74rem;font-weight:800}.up{color:var(--accent)}.down{color:var(--danger)}.flat{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:34px 12px}.empty .em{font-size:2.2rem;display:block;margin-bottom:8px}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:#17222f;border:1px solid var(--line);color:var(--txt);padding:10px 16px;border-radius:999px;font-size:.85rem;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}.toast.ok{border-color:var(--accent2)}.toast.err{border-color:var(--danger)}
  .matchcard{border:1px solid var(--line);border-radius:var(--rs);padding:13px;margin-bottom:10px;background:var(--card)}
  .pickrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0}
  .chip{background:#11202e;border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:.8rem;cursor:pointer;font-weight:700}
  .hidden{display:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .gridm{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .stat{display:flex;flex-direction:column;align-items:center;background:#0c1622;border:1px solid var(--line);border-radius:var(--rs);padding:12px 6px}
  .stat .v{font-size:1.5rem;font-weight:900}.stat .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .medal{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;background:#0c1622;border:1px solid var(--line);border-radius:14px;padding:12px 8px}
  .medal.on{border-color:var(--gold);box-shadow:0 0 16px rgba(255,207,92,.12)}
  .medal.off{opacity:.4}
  .medal .ic{font-size:1.8rem}.medal .nm{font-size:.72rem;font-weight:800;margin-top:6px;line-height:1.15}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:70;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:820px;padding:18px;max-height:85vh;overflow:auto}
  @media(min-width:560px){.backdrop{align-items:center}.sheet{border-radius:20px}}
  .emojigrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .emojigrid button{font-size:1.4rem;padding:8px 0;background:#0c1622;border:1px solid var(--line);border-radius:10px}
  .emojigrid button.sel{border-color:var(--accent);background:rgba(0,230,168,.12)}
  .winbar{display:flex;height:12px;border-radius:999px;overflow:hidden;border:1px solid var(--line);margin-top:8px}
  .winbar i{display:block;height:100%}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:.74rem;color:var(--muted);margin-top:6px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  svg{display:block;width:100%;height:auto}
  .pill2{font-size:.72rem;color:var(--accent);border:1px solid var(--accent2);padding:3px 9px;border-radius:999px}
  a.link{color:var(--accent);text-decoration:none;font-weight:700;font-size:.85rem}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

  /* ===== Identidad visual Kapital Partners · Mundial 2026 ===== */
  header.kp-headbar{background:linear-gradient(90deg,#0D2433,#0a1c27);border-bottom:2px solid #00DA9B}
  .bhr-head{display:flex;align-items:center}
  .bhr-head img{height:48px;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  .hdrtitle b{color:#fff}
  .bhr-hero{background:linear-gradient(135deg,#0D2433 0%,#0a1c27 55%,#07151d 100%);border:1px solid #00DA9B;border-radius:18px;padding:22px 18px 20px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(13,36,51,.4)}
  .bhr-hero::after{content:"";position:absolute;inset:0;background:radial-gradient(420px 240px at 80% -10%,rgba(0,218,155,.35),transparent 60%);pointer-events:none}
  .bhr-hero img.word{height:88px;max-width:92%;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
  .bhr-hero .pwr{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:12px;position:relative;z-index:1}
  .bhr-hero .pwr img{height:22px;max-width:88%;opacity:.97}
  .bhr-hero .ofc{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#9fe9d3;font-weight:800;margin-top:10px;position:relative;z-index:1}
  header .logo{display:none}
  .kp-plate{background:#0D2433;border:1px solid #18323e;border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .kp-head{height:34px;padding:0 9px}.kp-head img{height:30px;display:block}
  .hdrtitle{display:flex;flex-direction:column;line-height:1.08}
  .hdrtitle b{font-size:.82rem;font-weight:800;letter-spacing:.2px}
  .hdrtitle span{font-size:.58rem;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}
  .kp-lockup{background:#0D2433;border:1px solid #18323e;border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
  .kp-lockup img{height:34px;max-width:82%}
  .official{text-align:center;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 0 14px}
  .brandtag{display:flex;align-items:center;gap:8px;margin:0 0 12px}
  .brandtag img{height:22px;border-radius:5px}
  .brandtag span{font-size:.64rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
  .pitch{position:absolute;inset:0;pointer-events:none}
  .hero>*{position:relative;z-index:1}.hero>.pitch{z-index:0}
  .mv{display:inline-flex;align-items:center;gap:1px;font-size:.7rem;font-weight:800;padding:2px 7px;border-radius:999px;border:1px solid var(--line);margin-left:6px}
  .mv.up{color:var(--accent);border-color:var(--accent2)}.mv.dn{color:var(--danger);border-color:var(--danger)}.mv.eq{color:var(--muted)}
  .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .kpi .k{background:linear-gradient(180deg,#0e2030,#0c1622);border:1px solid var(--line);border-radius:12px;padding:11px 6px;text-align:center}
  .kpi .k .v{font-size:1.2rem;font-weight:900;color:var(--accent)}
  .kpi .k .l{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
  @media(max-width:460px){.kpi{grid-template-columns:repeat(2,1fr)}}
  .rev{position:fixed;inset:0;z-index:90;background:radial-gradient(700px 520px at 50% 18%,rgba(0,218,155,.18),transparent 60%),rgba(4,8,12,.96);backdrop-filter:blur(9px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:auto}
  .rev .revlogo{height:96px;max-width:80%;margin-bottom:6px;filter:drop-shadow(0 3px 12px rgba(0,0,0,.5));animation:pop .5s ease}
  .rev .revtag{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:#9fe9d3;font-weight:800;margin-bottom:18px}
  .rev .cd{font-size:5.5rem;font-weight:900;color:var(--accent);animation:pop .45s ease}
  .rev .scoreline{display:flex;align-items:center;gap:14px;margin:8px 0;animation:pop .5s ease}
  .rev .scoreline .t{font-size:1.05rem;font-weight:800;max-width:120px}
  .rev .scoreline .sc{font-size:3.4rem;font-weight:900;color:var(--accent);white-space:nowrap}
  .rev .rstats{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;justify-content:center}
  .rev .rstats .c{background:#0e1c29;border:1px solid var(--line);border-radius:12px;padding:9px 18px}
  .rev .rstats .c .n{font-size:1.7rem;font-weight:900}
  .rev .moves{width:100%;max-width:420px;margin-top:4px;text-align:left}
  .rev .moverow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
  .wow{font-size:1.25rem;font-weight:900;color:var(--gold);margin:6px 0;animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.55);opacity:0}100%{transform:scale(1);opacity:1}}
  .confetti{position:fixed;top:-14px;width:9px;height:14px;z-index:95;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(106vh) rotate(680deg);opacity:.85}}

  /* ===== LIVE WORLD CUP ===== */
  .livetitle{display:flex;align-items:center;gap:8px;font-size:1.3rem;font-weight:900;margin:2px 0 12px}
  .livebar{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,rgba(255,93,108,.16),transparent);border:1px solid var(--danger);border-radius:12px;padding:7px 12px;margin-bottom:8px}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--danger);animation:pulse 1.4s infinite;flex:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,93,108,.55)}70%{box-shadow:0 0 0 10px rgba(255,93,108,0)}100%{box-shadow:0 0 0 0 rgba(255,93,108,0)}}
  .bigscore{font-size:2.5rem;font-weight:900;white-space:nowrap}
  .track{position:relative;height:30px;border-radius:999px;background:#0a121b;border:1px solid var(--line);overflow:hidden;flex:1}
  .track .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .track .car{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:1.05rem;transition:left 1.1s cubic-bezier(.2,.8,.2,1);z-index:2;filter:drop-shadow(0 1px 2px #000)}
  .racerow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .racerow .nm{width:90px;font-size:.76rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcard{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:linear-gradient(90deg,#0e1c29,#0c1622)}
  .pcard .pw{margin-left:auto;font-weight:900;color:var(--accent);font-size:1.05rem}
  .bdg{font-size:.95rem;letter-spacing:1px}
  .stories{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;scroll-snap-type:x mandatory}
  .story{min-width:205px;scroll-snap-align:start;background:linear-gradient(135deg,#0e2a3d,#0a1726);border:1px solid var(--line);border-radius:16px;padding:14px;flex:none}
  .story .em{font-size:1.7rem}.story .h{font-weight:800;margin-top:6px;font-size:.92rem;line-height:1.2}.story .s{font-size:.74rem;color:var(--muted);margin-top:4px}
  .impactrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)}
  .livehint{text-align:center;color:var(--muted);padding:18px;border:1px dashed var(--line);border-radius:14px;margin-bottom:14px;font-size:.85rem}

  /* ===== Centro de Resultados ===== */
  .rcard{background:linear-gradient(180deg,#0f1d2b,#0c1622);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;margin-bottom:16px;position:relative;overflow:hidden}
  .rcard.final{border-color:#1f4a3e}.rcard.rev{border-color:#2a5246}
  .rtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(29,63,92,.6)}
  .rphase{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800}
  .rmatch{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 14px}
  .rteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .crest{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:900;font-size:1rem;color:#04130f;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .rteam .nm{font-size:.74rem;font-weight:700;line-height:1.1}
  .rscore{font-size:2.3rem;font-weight:900;white-space:nowrap;letter-spacing:1px}
  .rscore .w{color:var(--accent)}
  .qstats{display:flex;gap:8px;margin-top:10px}
  .qstats .q{flex:1;background:#0a141e;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center}
  .qstats .q .n{font-weight:900;font-size:1.15rem}.qstats .q .t{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .rfilter{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px}
  .rfilter .chip[aria-pressed="true"]{background:var(--accent);color:#04130f;border-color:var(--accent)}
  .rhero{margin-bottom:18px}
  .rhero img.word{height:88px;max-width:92%}
  .kp-footer{display:flex;align-items:center;justify-content:center;gap:7px;margin:26px 0 8px;opacity:.7}
  .kp-footer span{font-size:.68rem;letter-spacing:.1em;color:var(--muted);font-weight:700}
  .kp-foot{display:flex;align-items:center;justify-content:center;padding:16px 12px 22px;margin-top:6px}
  .kp-foot span{font-size:.7rem;letter-spacing:.12em;color:var(--muted);font-weight:800;text-transform:uppercase;opacity:.8}
  .kp-foot img{height:26px;max-width:88%;opacity:.85;display:block}
  .row.mine{background:rgba(0,218,155,.14);border:1px solid #00DA9B;border-radius:10px;padding:5px 8px}
  .chip.on{background:var(--gold);color:#1a1306;border-color:var(--gold)}
  .myresult{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding:9px 12px;border-radius:11px;font-weight:800;font-size:.85rem}
  .myresult.ok{background:rgba(255,207,92,.14);border:1px solid var(--gold);color:#ffdf9b}
  .myresult.mid{background:rgba(0,218,155,.14);border:1px solid var(--accent);color:#bcdcff}
  .myresult.bad{background:rgba(255,93,108,.12);border:1px solid #ff5d6c;color:#ffb3bb}
  .myresult.none{background:#0a141e;border:1px solid var(--line);color:var(--muted);justify-content:center}
  .t5card{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,#0f1d2b,#0c1622);border:1px solid var(--line);border-radius:13px;padding:10px 12px;margin-bottom:8px}
  .gtrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid rgba(29,63,92,.5)}
  .gtrow:last-child{border-bottom:none}
  .gtrow.lead .gtpos{color:var(--gold)}
  .gtrow.mine{background:rgba(0,218,155,.08);border-radius:10px}

<script>
"use strict";
/* ╔══════════════════════════════════════════════════════════════════════════╗
   ║  CONFIGURACIÓN POR INSTANCIA  ·  ÚNICO BLOQUE A EDITAR POR CLIENTE          ║
   ║                                                                            ║
   ║  Esta quiniela es una PLANTILLA MULTICLIENTE. Para generar una quiniela    ║
   ║  nueva e independiente para otro cliente, duplica este HTML y reemplaza    ║
   ║  ÚNICAMENTE las tres constantes de abajo. Cada cliente debe tener:         ║
   ║    · Su propio Google Sheet (base de datos).                               ║
   ║    · Su propio Apps Script enlazado a ese Sheet.                           ║
   ║    · Su propia implementación (Web App) con su propia URL /exec.           ║
   ║                                                                            ║
   ║  No existe nube central ni referencias compartidas: toda la información    ║
   ║  (jugadores, pronósticos, resultados, configuración y ganadores) vive en   ║
   ║  el Sheet al que apunta API_URL. Cambiar API_URL = instalación distinta.   ║
   ║  INSTANCE_ID separa además el almacenamiento local del navegador, para     ║
   ║  que dos quinielas abiertas en el mismo equipo NUNCA mezclen su sesión.    ║
   ╚══════════════════════════════════════════════════════════════════════════╝ */

/* 1) Identificador corto y único de ESTE cliente (solo letras/números/guion).
      Ej.: "bhr", "lchtyres", "clienteacme". Cambiar este valor por cliente. */
const INSTANCE_ID="kapital";

/* 2) URL de la Web App (Apps Script) de ESTE cliente. Termina en /exec. */
const API_URL="https://script.google.com/macros/s/AKfycbwIT9Hk4ehHCrNPUWTr0q5Egzs4Gww-AG2psO05ovrUivvcDNFFv8W1M_xezah1WIFI/exec";

/* 3) Enlace al Google Sheet de ESTE cliente (opcional; habilita el botón
      "Abrir Google Sheet" en Ajustes). Déjalo vacío si no quieres mostrarlo. */
const SHEET_URL="";
/* ══════════════════ FIN DE CONFIGURACIÓN POR INSTANCIA ══════════════════════ */

/* Clave de sesión local, derivada de INSTANCE_ID: cada instancia usa su propio
   espacio en localStorage, por lo que las sesiones nunca se cruzan entre
   clientes aunque se abran en el mismo navegador. No editar manualmente. */
const SESSION_KEY="quiniela_"+INSTANCE_ID+"_session_v2";

async function api(action,payload){
  if(!API_URL||API_URL.indexOf("PEGA_AQUI")===0){const e=new Error("config");e.kind="config";throw e;}
  if(typeof navigator!=="undefined"&&navigator.onLine===false){const e=new Error("offline");e.kind="internet";throw e;}
  const body=JSON.stringify({action:action,payload:payload||{},identity:{me:state.me,mode:state.mode,auth:state._auth||"",mePass:state._mePass||""}});
  let res;
  try{ res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:body}); }
  catch(netErr){ const e=new Error("network");e.kind="internet";throw e; }
  if(!res.ok){ const e=new Error("http "+res.status);e.kind=(res.status>=500?"server":"script");e.status=res.status;throw e; }
  const txt=await res.text();
  try{ return JSON.parse(txt); }
  catch(parseErr){ const e=new Error("bad-json");e.kind="script";throw e; }
}
function connError(e){
  const k=e&&e.kind;
  if(k==="internet")return "Sin conexión a internet. Revisa tu red e intenta de nuevo.";
  if(k==="script")return "Error en el servicio de la quiniela (Apps Script). Avisa a la administración.";
  if(k==="server")return "Google respondió con un error temporal del servidor. Reintentando…";
  if(k==="config")return "La aplicación no está configurada: falta el enlace a la nube.";
  return "Sin conexión con la nube. Reintentando…";
}
function mergeShared(d){
  if(!d)return;
  state.participants=d.participants||[];
  state.matches=d.matches||[];
  state.predictions=d.predictions||{};
  state.championPicks=d.championPicks||{};
  state.champion=d.champion||"";
  state.champLocked=!!(d.champLocked);
  state.champRevealed=!!(d.champRevealed);
  state.prize=Number(d.prize||0);
  if(typeof d.awards!=="undefined"&&d.awards!==null){
    try{const a=typeof d.awards==="string"?JSON.parse(d.awards||"{}"):d.awards;
      state.awards={first:a.first||"",second:a.second||"",third:a.third||"",revealed:!!a.revealed};
    }catch(e){}
  }
  if(typeof d.isAdmin==="boolean"&&state.mode==="admin"&&!d.isAdmin){ /* sesión admin caducó */ }
}
let _bootInFlight=null;      // promesa del bootstrap en curso (patrón "última intención gana")
let _bootPending=false;      // se solicitó un bootstrap nuevo mientras otro estaba en vuelo
let _bootPendingOpts=null;
let _awardsDirty=false;      // si true, fuerza render aunque no haya cambios en firma
let _lastRevealed=null;
let _lastAwardsRevealed=null;
let _pushBusy=false;
let _dataSig="";             // firma del último snapshot aplicado (sondeo solo re-renderiza si cambió)
function revealedIdSet(){const s={};(state.matches||[]).forEach(m=>{if(m.revealed)s[m.id]=true;});return s;}
function dataSignature(){
  try{
    return JSON.stringify({
      p:(state.participants||[]).map(x=>x.id+":"+(x.name||"")+":"+(x.emoji||"")),
      m:(state.matches||[]).map(x=>x.id+":"+(x.revealed?1:0)+":"+(x.locked?1:0)+":"+(x.result?(x.result.home+"-"+x.result.away):"")),
      pr:JSON.stringify(state.predictions||{}),
      cp:JSON.stringify(state.championPicks||{}),
      ch:state.champion||"", pz:state.prize||0,
      cl:state.champLocked?1:0, cr:state.champRevealed?1:0,
      aw:JSON.stringify(state.awards||{})
    });
  }catch(e){ return String(Date.now()+Math.random()); }
}
function showOffline(msg){let el=document.getElementById("offlineBanner");
  if(!el){el=document.createElement("div");el.id="offlineBanner";
    el.style.cssText="position:fixed;left:0;right:0;top:0;z-index:10000;background:#E84D2E;color:#fff;font-family:inherit;font-size:.9rem;text-align:center;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.25)";
    document.body.appendChild(el);}
  el.textContent=msg||"Sin conexión con la nube. Reintentando automáticamente…";
  el.style.display="block";}
function hideOffline(){const el=document.getElementById("offlineBanner");if(el)el.style.display="none";}
function resetSessionState(){
  // Limpia los datos derivados de la sesión anterior para que ninguna vista
  // muestre información del usuario previo hasta recibir el snapshot nuevo.
  state.predictions={};
  state.championPicks={};
  state.champion="";
  _dataSig="";
  _lastRevealed=null;
  _lastAwardsRevealed=null;
  _awardsDirty=false;
}
// Bloqueo de botón mientras una acción async está en curso: evita doble clic y muestra estado de carga.
function lockBtn(btn,busyText){
  if(!btn||btn.dataset.busy==="1")return null;
  btn.dataset.busy="1";btn.dataset.prevText=btn.textContent;btn.disabled=true;
  btn.style.opacity="0.7";btn.style.pointerEvents="none";
  if(busyText)btn.textContent=busyText;
  return ()=>{btn.dataset.busy="0";btn.disabled=false;btn.style.opacity="";btn.style.pointerEvents="";
    if(btn.dataset.prevText!=null)btn.textContent=btn.dataset.prevText;};
}
function showLoading(msg){let el=document.getElementById("loadOverlay");
  if(!el){el=document.createElement("div");el.id="loadOverlay";
    el.style.cssText="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,36,51,.82);backdrop-filter:blur(3px);color:#fff;font-family:inherit;gap:14px";
    el.innerHTML='<div style="width:42px;height:42px;border:4px solid rgba(255,255,255,.25);border-top-color:#00DA9B;border-radius:50%;animation:kpspin .8s linear infinite"></div><div id="loadMsg" style="font-size:.95rem;letter-spacing:.3px"></div>';
    document.body.appendChild(el);
    const st=document.createElement("style");st.textContent="@keyframes kpspin{to{transform:rotate(360deg)}}";document.head.appendChild(st);}
  document.getElementById("loadMsg").textContent=msg||"Procesando…";el.style.display="flex";}
function hideLoading(){const el=document.getElementById("loadOverlay");if(el)el.style.display="none";}
function notifyRevealed(){
  const prev=_lastRevealed||{};const now=revealedIdSet();
  let nuevos=0;Object.keys(now).forEach(id=>{if(!prev[id])nuevos++;});
  _lastRevealed=now;
  if(nuevos>0 && state.mode==="player"){
    openModal(`<div style="text-align:center"><div style="font-size:2.4rem">🔓</div>
      <h2>¡Resultados revelados!</h2>
      <p class="sub">Los resultados oficiales han sido revelados. Ya puedes consultar tus puntos y la clasificación actual.</p>
      <button class="btn primary block" id="okRev">Ver resultados</button></div>`);
    const b=document.getElementById("okRev");if(b)b.onclick=()=>{closeModal();go("results");};
  }
}
function awardsRevealedFlag(){return !!(state.awards&&state.awards.revealed);}
function notifyAwardsRevealed(){
  const was=_lastAwardsRevealed;const now=awardsRevealedFlag();
  _lastAwardsRevealed=now;
  if(was===false && now===true){
    launchConfetti();setTimeout(launchConfetti,650);
    if(state.mode==="player"){
      openModal(`<div style="text-align:center"><div style="font-size:2.6rem">🏆</div>
        <h2>¡Ganadores finales revelados!</h2>
        <p class="sub">Ya se anunciaron los ganadores oficiales de la Quiniela Mundial 2026. Descúbrelos en la pantalla Live.</p>
        <button class="btn primary block" id="okAw">Ver ganadores</button></div>`);
      const b=document.getElementById("okAw");if(b)b.onclick=()=>{closeModal();go("live");};
    }
  }
}
async function bootstrap(opts){
  if(opts===true) opts={showToast:true};
  opts=opts||{};
  // Si ya hay un bootstrap en vuelo, marcamos uno pendiente y devolvemos la misma promesa.
  if(_bootInFlight){ _bootPending=true; _bootPendingOpts=opts; return _bootInFlight; }
  const background=!!opts.background;
  _bootInFlight=(async()=>{
    try{
      const r=await api("bootstrap",{});
      if(r&&r.ok){
        mergeShared(r.data);
        const sig=dataSignature();
        const changed=(sig!==_dataSig);
        _dataSig=sig;
        if(opts.showToast)toast("Actualizado.");
        // Notificación "Resultados revelados": solo cuando hay nuevos revelados
        // dentro de una sesión activa. La primera carga fija una línea base.
        if(_lastRevealed===null){ _lastRevealed=revealedIdSet(); _lastAwardsRevealed=awardsRevealedFlag(); }
        else { notifyRevealed(); notifyAwardsRevealed(); }
        // En primer plano siempre re-renderiza; en sondeo de fondo solo si hubo cambios,
        // conservando la posición de scroll para no provocar saltos visuales.
        if(!background){ render(); }
        else if(changed||_awardsDirty){ const sy=window.scrollY; render(); window.scrollTo(0,sy); _awardsDirty=false; }
        refreshIdentityIfOpen();
        hideOffline();
      }else{
        if(opts.showToast)toast((r&&r.error)||"Error al cargar.","err");
      }
    }catch(e){
      const msg=connError(e);
      if(opts.showToast)toast(msg,"err");
      showOffline(msg);
    }finally{ _bootInFlight=null; }
  })();
  const p=_bootInFlight;
  await p;
  // Si llegó una nueva solicitud mientras este corría, reejecutamos con esos parámetros.
  if(_bootPending){ _bootPending=false; const o=_bootPendingOpts||{}; _bootPendingOpts=null; return bootstrap(o); }
  return p;
}
let _pushQueue=Promise.resolve();
function push(action,payload,loadingMsg){
  const run=async()=>{
    _pushBusy=true;showLoading(loadingMsg||"Guardando…");
    try{
      const r=await api(action,payload);
      if(r&&r.ok){ mergeShared(r.data); _dataSig=dataSignature(); _lastRevealed=revealedIdSet(); _lastAwardsRevealed=awardsRevealedFlag(); render(); hideOffline(); return true; }
      toast((r&&r.error)||"No se pudo guardar.","err"); await bootstrap(); return false;
    }catch(e){
      const msg=connError(e);
      toast(msg.replace("Reintentando…","Tu cambio no se guardó."),"err"); showOffline(msg); await bootstrap(); return false;
    }
    finally{ _pushBusy=false; hideLoading(); }
  };
  // Encadenamos para que dos guardados seguidos no se pisen ni se descarten.
  _pushQueue=_pushQueue.then(run,run);
  return _pushQueue;
}
const PHASES=[
 {id:"group",name:"Fase de grupos",bonus:1.0},{id:"r32",name:"Dieciseisavos",bonus:1.2},
 {id:"r16",name:"Octavos",bonus:1.4},{id:"qf",name:"Cuartos",bonus:1.6},

function revealCeremony(m,before,after){
 const bMap=Object.fromEntries(before.map(r=>[r.id,r.rank]));
 const aMap=Object.fromEntries(after.map(r=>[r.id,r.rank]));

 const oldL=before[0]&&before[0].id,newL=after[0]&&after[0].id;const leaderChanged=oldL&&newL&&oldL!==newL;

  document.getElementById("revClose").onclick=()=>bd.remove();

 }

// Precarga (solo admin) los partidos oficiales que aún no existan. No duplica ni borra resultados ya cargados.
async function preloadOfficialMatches(btn){
  if(state.mode!=="admin"){toast("Solo la administración puede precargar partidos.","err");return;}
  const have=new Set(state.matches.map(m=>m.id));
  const pend=MATCHES_2026.filter(m=>!have.has(m.id));
  if(!pend.length){toast("Los partidos oficiales ya están cargados.");return;}
  if(!confirm("Se precargarán "+pend.length+" partidos oficiales del Mundial 2026 (horario de Chihuahua). ¿Continuar?"))return;
  const unlock=lockBtn(btn,"Precargando…");
  showLoading("Precargando partidos… 0/"+pend.length);
  let okN=0,base=Date.now();
  try{
    for(let i=0;i<pend.length;i++){
      const m=pend[i];
      const r=await api("addMatch",{id:m.id,home:m.home,away:m.away,phase:"group",matchday:m.matchday,kickoff:m.kickoff,grupo:m.grupo,createdAt:base+i});
      if(r&&r.ok){okN++;if(r.data)mergeShared(r.data);}
      showLoading("Precargando partidos… "+(i+1)+"/"+pend.length);
    }
    await bootstrap();render();
    toast(okN+" partidos precargados.");
  }catch(e){
    await bootstrap();render();
    toast(connError(e).replace("Reintentando…","Se interrumpió la precarga.")+" Vuelve a intentar para completar.","err");
  }finally{hideLoading();if(unlock)unlock();}
}

// Borra TODOS los jugadores existentes y carga la lista oficial PLAYERS_SEED con sus contraseñas.
async function seedPlayers(btn){

    toast(PLAYERS_SEED.length+" jugadores cargados con sus contraseñas.");
  }catch(e){
    await bootstrap();render();
    toast(connError(e).replace("Reintentando…","Se interrumpió la carga.")+" Vuelve a intentar para completar.","err");
  }finally{hideLoading();if(unlock)unlock();}
}
// las elecciones de campeón y cualquier resultado/revelación, dejando los partidos en blanco.
async function blankSlateForStart(btn){
  if(state.mode!=="admin"){toast("Solo la administración puede hacer esto.","err");return;}
  const dirtyMatches=state.matches.filter(m=>m.result||m.revealed||m.locked);
  const withPreds=state.participants.filter(p=>state.predictions[p.id]&&Object.keys(state.predictions[p.id]).length);
  const withChamp=state.participants.filter(p=>state.championPicks[p.id]);
  const total=dirtyMatches.length+withPreds.length+withChamp.length;
  if(!total){toast("Todo está en blanco. Ya puedes empezar a pronosticar.");return;}
  if(!confirm("Se borrarán todos los pronósticos, las elecciones de campeón y los resultados/revelaciones.\n\nLos "+state.matches.length+" partidos y los jugadores se conservan.\n\n¿Dejar la quiniela en blanco para empezar?"))return;
  const unlock=lockBtn(btn,"Dejando en blanco…");
  showLoading("Limpiando… 0/"+total);
  let done=0;
  const step=()=>{done++;showLoading("Limpiando… "+done+"/"+total);};
  try{
    for(const p of withPreds){const r=await api("setPredictions",{playerId:p.id,map:{}});if(r&&r.data)mergeShared(r.data);step();}
    for(const p of withChamp){const r=await api("setChampionPick",{playerId:p.id,team:""});if(r&&r.data)mergeShared(r.data);step();}
    for(const m of dirtyMatches){const r=await api("patchMatch",{id:m.id,fields:{result:null,resultAt:null,locked:false,revealed:false,revealedAt:null}});if(r&&r.data)mergeShared(r.data);step();}
    await bootstrap();render();
    toast("Quiniela en blanco. Ya puedes empezar a llenar pronósticos.");
  }catch(e){
    await bootstrap();render();
    toast(connError(e).replace("Reintentando…","Se interrumpió la limpieza.")+" Vuelve a intentar para completar.","err");
  }finally{hideLoading();if(unlock)unlock();}
}

function fmtKick(k){if(!k)return"";const p=String(k).split("T");const d=(p[0]||"").split("-");const t=(p[1]||"").slice(0,5);const mes=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][parseInt(d[1],10)-1]||"";const dia=d[2]?String(parseInt(d[2],10)):"";return (dia&&mes?dia+" "+mes:"")+(t?(dia?" · ":"")+t:"");}

function winner(r){if(!r)return null;if(r.home>r.away)return"H";if(r.away>r.home)return"A";return"D";}
function computePoints(pred,result,phase){
 if(!pred||!result||pred.home===""||pred.away===""||pred.home==null||pred.away==null)return{points:0,exact:false,correct:false};
 let pts=0,exact=false,correct=false;
 if(winner(pred)===winner(result)){pts+=SC.result;correct=true;}
 if(pred.home===result.home&&pred.away===result.away){pts+=SC.exact-SC.result;exact=true;}
 if(correct&&!exact&&Math.abs(pred.home-pred.away)===Math.abs(result.home-result.away))pts+=SC.goalDiff;
 pts=Math.round(pts*phaseBonus(phase)*(pred.joker?SC.joker:1));
 return{points:pts,exact,correct};
}
function predOf(pid,mid){return(state.predictions[pid]||{})[mid];}
function captureStatus(mid){const done=[],pending=[];
  (state.participants||[]).forEach(p=>{const pr=predOf(p.id,mid);
    if(pr&&pr.home!==""&&pr.home!=null&&pr.away!==""&&pr.away!=null)done.push(p.name);else pending.push(p.name);});
  return {done:done.length,total:(state.participants||[]).length,pending:pending};}
function matchesSorted(){return[...state.matches].sort((a,b)=>(a.matchday-b.matchday)||(a.kickoff||"").localeCompare(b.kickoff||"")||(a.createdAt||0)-(b.createdAt||0));}
function scoredMatches(){return matchesSorted().filter(m=>m.result&&m.revealed);}
function jornadasWithResults(){return[...new Set(scoredMatches().map(m=>m.matchday))].sort((a,b)=>a-b);}

function standingsUpTo(maxJ,withChampion){
 const rows=state.participants.map(p=>({id:p.id,name:p.name,emoji:p.emoji,points:0,exact:0,correct:0,made:0}));
 const idx=Object.fromEntries(rows.map(r=>[r.id,r]));
 scoredMatches().forEach(m=>{ if(m.matchday>maxJ)return;
   state.participants.forEach(p=>{const pr=predOf(p.id,m.id);if(!pr)return;
     const r=idx[p.id];const c=computePoints(pr,m.result,m.phase);
     r.points+=c.points;r.made++;if(c.exact)r.exact++;if(c.correct||c.exact)r.correct++;});});
 if(withChampion&&state.champion){state.participants.forEach(p=>{if((state.championPicks[p.id]||"")===state.champion){idx[p.id].points+=SC.championPick;idx[p.id].champ=true;}});}
 rows.sort((a,b)=>b.points-a.points||b.exact-a.exact||b.correct-a.correct||a.name.localeCompare(b.name));
 rows.forEach((r,i)=>r.rank=i+1);
 return rows;
}
const standings=()=>standingsUpTo(Infinity,true);
function rankMap(maxJ){const m={};standingsUpTo(maxJ,false).forEach(r=>m[r.id]=r.rank);return m;}
function risersFallers(){
 const js=jornadasWithResults();if(js.length<2)return{risers:[],fallers:[]};
 const cur=rankMap(js[js.length-1]),prev=rankMap(js[js.length-2]);
 const arr=state.participants.map(p=>({id:p.id,d:(prev[p.id]||99)-(cur[p.id]||99)})).filter(x=>x.d!==0);
 return{risers:arr.filter(x=>x.d>0).sort((a,b)=>b.d-a.d),fallers:arr.filter(x=>x.d<0).sort((a,b)=>a.d-b.d)};
}
function weeklyTop(){
 const js=jornadasWithResults();if(!js.length)return{j:null,rows:[]};
 const j=js[js.length-1];
 const rows=state.participants.map(p=>{let pts=0;scoredMatches().filter(m=>m.matchday===j).forEach(m=>{const pr=predOf(p.id,m.id);if(pr)pts+=computePoints(pr,m.result,m.phase).points;});return{id:p.id,name:p.name,emoji:p.emoji,pts};})
   .filter(r=>r.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,5);
 return{j,rows};
}
function streakOf(pid){let cur=0,best=0;scoredMatches().forEach(m=>{const pr=predOf(pid,m.id);if(!pr){cur=0;return;}const c=computePoints(pr,m.result,m.phase);if(c.correct||c.exact){cur++;best=Math.max(best,cur);}else cur=0;});return{cur,best};}
function cumulativeByJornada(pid){const js=jornadasWithResults();let acc=0;return js.map(j=>{scoredMatches().filter(m=>m.matchday===j).forEach(m=>{const pr=predOf(pid,m.id);if(pr)acc+=computePoints(pr,m.result,m.phase).points;});return acc;});}

function statsOf(pid){
 let exact=0,correct=0,made=0,draws=0,surprise=0,points=0;const perJ={};
 scoredMatches().forEach(m=>{const pr=predOf(pid,m.id);if(!pr)return;const c=computePoints(pr,m.result,m.phase);
   made++;points+=c.points;if(c.exact)exact++;if(c.correct||c.exact)correct++;
   if(winner(m.result)==="D"&&c.correct)draws++;
   if(c.correct&&Math.abs(m.result.home-m.result.away)>=3)surprise++;
   perJ[m.matchday]=perJ[m.matchday]||{tot:0,ok:0};perJ[m.matchday].tot++;if(c.correct||c.exact)perJ[m.matchday].ok++;});
 const perfectJornada=Object.values(perJ).some(x=>x.tot>=2&&x.ok===x.tot);
 const st=streakOf(pid);
 return{exact,correct,made,draws,surprise,points,perfectJornada,bestStreak:st.best,curStreak:st.cur,eff:made?Math.round(correct/made*100):0};
}
function achievementsOf(pid){
 const s=statsOf(pid);const all=standings();const maxExact=Math.max(0,...all.map(r=>r.exact));
 const rank=(all.find(r=>r.id===pid)||{}).rank;
 return[
  {ic:"🔮",nm:"Oráculo del Mundial",on:s.exact>=5,desc:"5+ marcadores exactos"},
  {ic:"🎯",nm:"Rey del Marcador Exacto",on:s.exact>0&&s.exact===maxExact,desc:"Máximo de exactos"},
  {ic:"🤝",nm:"Especialista en Empates",on:s.draws>=3,desc:"Acertó 3+ empates"},
  {ic:"🐺",nm:"Cazador de Sorpresas",on:s.surprise>=1,desc:"Acertó una goleada (dif 3+)"},
  {ic:"🛡️",nm:"Invicto de la Jornada",on:s.perfectJornada,desc:"Jornada completa acertada"},
  {ic:"🔥",nm:"En Racha",on:s.bestStreak>=3,desc:"3+ aciertos seguidos"},
  {ic:"⭐",nm:"Primer Acierto",on:s.correct>=1,desc:"Tu primer acierto"},
  {ic:"👑",nm:"Líder",on:rank===1&&s.made>0,desc:"1º lugar general"}
 ];
}

function lineChart(labels,series,h){h=h||180;
 if(!labels.length)return`<div class="empty tiny">Aún no hay jornadas con resultados.</div>`;
 const W=320,H=h,pad=26,maxY=Math.max(1,...series.flatMap(s=>s.data));
 const x=i=>pad+(labels.length<=1?(W-2*pad)/2:i*(W-2*pad)/(labels.length-1));
 const y=v=>H-pad-(v/maxY)*(H-2*pad);
 const grid=[0,.5,1].map(f=>`<line x1="${pad}" x2="${W-pad}" y1="${H-pad-f*(H-2*pad)}" y2="${H-pad-f*(H-2*pad)}" stroke="#1e2a3a"/>
   <text x="2" y="${H-pad-f*(H-2*pad)+3}" fill="#8a9bb2" font-size="8">${Math.round(maxY*f)}</text>`).join("");
 const xl=labels.map((l,i)=>`<text x="${x(i)}" y="${H-8}" fill="#8a9bb2" font-size="8" text-anchor="middle">J${l}</text>`).join("");
 const lines=series.map(s=>{const pts=s.data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
   const dots=s.data.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="2.5" fill="${s.color}"/>`).join("");
   return`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round"/>${dots}`;}).join("");
 return`<svg viewBox="0 0 ${W} ${H}" role="img">${grid}${lines}${xl}</svg>`;
}

}

// Color estable por jugador (mismo criterio que las insignias).
function playerColor(id){
  const pal=["#00DA9B","#4aa3ff","#ffcf5c","#9b8cff","#ff5d6c","#10b3a3","#e0925a","#5ad1c4","#f0a93a","#7fb4ff","#ff8fb3","#7ee081","#c792ea","#ffd166"];
  let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return pal[h%pal.length];
}
// Gráfico ilustrativo: evolución de puntos acumulados de TODOS los jugadores a lo largo de las jornadas.
function evolutionChart(){
  const js=jornadasWithResults();
  if(!js.length)return`<div class="livehint">El avance de cada jugador aparecerá aquí en cuanto se revelen resultados por jornada.</div>`;
  // Puntos acumulados por jugador al cierre de cada jornada (sin bono de campeón, para reflejar el avance real).
  const snaps=js.map(j=>{const m={};standingsUpTo(j,false).forEach(r=>m[r.id]=r.points);return m;});
  const finalOrder=standingsUpTo(Infinity,false);
  const series=finalOrder.map(r=>({id:r.id,name:r.name,emoji:r.emoji,
    data:[0,...js.map((_,k)=>snaps[k][r.id]||0)],color:playerColor(r.id)}));
  const maxY=Math.max(1,...series.flatMap(s=>s.data));
  const W=720,H=300,padL=34,padR=14,padT=16,padB=34;
  const cols=js.length+1; // incluye el punto de inicio (0)
  const x=i=>padL+(cols<=1?(W-padL-padR)/2:i*(W-padL-padR)/(cols-1));
  const y=v=>H-padB-(v/maxY)*(H-padT-padB);
  const ticks=4;
  const grid=Array.from({length:ticks+1},(_,t)=>{const f=t/ticks;const gy=H-padB-f*(H-padT-padB);
    return`<line x1="${padL}" x2="${W-padR}" y1="${gy}" y2="${gy}" stroke="#1c2a3a" stroke-width="1"/>`+
      `<text x="${padL-6}" y="${gy+3}" fill="#7d8ea6" font-size="10" text-anchor="end">${Math.round(maxY*f)}</text>`;}).join("");
  const xlabels=["Inicio",...js.map(j=>"J"+j)].map((l,i)=>
    `<text x="${x(i)}" y="${H-12}" fill="#7d8ea6" font-size="10" text-anchor="middle">${esc(l)}</text>`).join("");
  const me=state.me;
  const lines=series.map(s=>{
    const isLeader=s.id===finalOrder[0].id, isMe=s.id===me;
    const sw=isLeader?3.4:(isMe?3:1.8);
    const col=isLeader?"#ffd166":s.color;
    const op=(isLeader||isMe)?1:.82;
    const pts=s.data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    const last=s.data.length-1, lv=s.data[last];
    const dot=`<circle cx="${x(last).toFixed(1)}" cy="${y(lv).toFixed(1)}" r="${(isLeader||isMe)?4.5:3}" fill="${col}" stroke="#0b121b" stroke-width="1"/>`;
    const tag=(isLeader||isMe)?`<text x="${(x(last)-7).toFixed(1)}" y="${(y(lv)-7).toFixed(1)}" fill="${col}" font-size="11" font-weight="800" text-anchor="end">${esc(s.name)} · ${lv}</text>`:"";
    return`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round" opacity="${op}"/>${dot}${tag}`;
  }).join("");
  const svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Evolución de puntos por jornada" style="width:100%;height:auto;display:block">${grid}${lines}${xlabels}</svg>`;
  const legend=`<div class="evlegend">`+series.map(s=>{
    const isLeader=s.id===finalOrder[0].id, isMe=s.id===me;
    const col=isLeader?"#ffd166":s.color;
    return`<span class="evchip ${(isLeader||isMe)?'on':''}"><i style="background:${col}"></i>${s.emoji?esc(s.emoji)+" ":""}${esc(s.name)}${isMe?' (tú)':''}${isLeader?' 👑':''}</span>`;
  }).join("")+`</div>`;
  return`<div class="evchart">${svg}</div>${legend}`;
}

function recentPrecisionOf(pid){const ms=scoredMatches().slice(-6);let c=0,t=0;ms.forEach(m=>{const pr=predOf(pid,m.id);if(!pr)return;t++;const r=computePoints(pr,m.result,m.phase);if(r.correct||r.exact)c++;});return t?Math.round(c/t*100):0;}
function powerRankings(){const base=standings();const dm=rankDeltaMap();const maxExact=Math.max(0,...base.map(r=>r.exact));const maxWeek=Math.max(1,...base.map(r=>weeklyPointsOf(r.id)));
 return base.map(r=>{const st=streakOf(r.id);const wk=weeklyPointsOf(r.id);const prec=recentPrecisionOf(r.id);const d=dm[r.id]||0;
  const power=r.points + wk*1.5 + st.cur*4 + (d>0?d*3:0) + prec*0.1;
  const b=[];if(r.rank===1&&r.made>0)b.push("👑");if(st.cur>=3)b.push("🔥");if(d>0)b.push("📈");if(r.rank>1&&wk>0&&wk>=maxWeek*0.8)b.push("⚡");if(r.exact>0&&r.exact===maxExact)b.push("🎯");
  return Object.assign({},r,{power:Math.round(power),wk:wk,prec:prec,streak:st.cur,delta:d,badges:b});
 }).sort((a,b)=>b.power-a.power);
}

 if(bs&&bs.cur>=2)out.push({em:"🔥",h:esc(bs.p.name)+" está en racha",s:bs.cur+" aciertos seguidos"});

 last.forEach(m=>{state.participants.forEach(p=>{const pr=predOf(p.id,m.id);if(pr){const c=computePoints(pr,m.result,m.phase);if(c.exact)out.push({em:"🎯",h:esc(p.name)+" clavó el marcador",s:esc(m.home)+" "+m.result.home+"–"+m.result.away+" "+esc(m.away)});}});});
 return out.slice(0,8);
}

// Carga SheetJS bajo demanda (solo al exportar) y genera un .xlsx con 5 hojas.
function loadXLSX(){
  if(window.XLSX)return Promise.resolve(window.XLSX);
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error("No se pudo cargar la librería de Excel."));
    document.head.appendChild(s);
  });
}
async function exportXlsx(btn){
  const unlock=lockBtn(btn,"Generando…");if(unlock===null)return;
  try{
    const XLSX=await loadXLSX();
    // Jugadores
    const jugadores=state.participants.map((p,i)=>{const st=statsOf(p.id);
      return {"#":i+1,Nombre:p.name,Emoji:p.emoji||"",Campeón:state.championPicks[p.id]||"",
        Aciertos:st.correct,Exactos:st.exact,"Efectividad %":Math.round((st.eff||0)*100)};});
    // Partidos
    const partidos=matchesSorted().map(m=>({Local:m.home,Visitante:m.away,Fase:phaseName(m.phase),
      Jornada:m.matchday,Fecha:(m.kickoff||"").replace("T"," "),
      Estado:m.revealed?"Revelado":(m.result?"Por revelar":(m.locked?"Cerrado":"Abierto")),
      "Resultado L":m.result?m.result.home:"","Resultado V":m.result?m.result.away:""}));
    // Pronósticos
    const pronosticos=[];
    state.participants.forEach(p=>{const map=state.predictions[p.id]||{};
      matchesSorted().forEach(m=>{const pr=map[m.id];if(!pr)return;
        pronosticos.push({Jugador:p.name,Partido:m.home+" vs "+m.away,Fase:phaseName(m.phase),Jornada:m.matchday,
          "Pron L":pr.home,"Pron V":pr.away,Joker:pr.joker?"Sí":"",
          Puntos:m.result?computePoints(pr,m.result,m.phase).points:""});});});
    // Resultados
    const resultados=matchesSorted().filter(m=>m.result).map(m=>({Partido:m.home+" vs "+m.away,
      Fase:phaseName(m.phase),Jornada:m.matchday,"Marcador":m.result.home+" - "+m.result.away,
      Revelado:m.revealed?"Sí":"No"}));
    // Rankings
    const rankings=standings().map(r=>({Posición:r.rank,Jugador:r.name,Puntos:r.points,
      Exactos:r.exact,Aciertos:r.correct}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(jugadores),"Jugadores");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(partidos),"Partidos");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pronosticos),"Pronósticos");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(resultados),"Resultados");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rankings),"Rankings");
    const stamp=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,"quiniela-bhr-"+stamp+".xlsx");
    toast("Excel descargado.");
  }catch(e){toast(e&&e.message?e.message:"No se pudo exportar a Excel.","err");}
  finally{if(unlock)unlock();}
}

 view.innerHTML=`<h2>Ajustes</h2>
  <div class="card"><label>Premio (MXN)</label><input id="prize" type="number" min="0" value="${Number(state.prize||0)}"/></div>
  <div class="card" style="text-align:center;padding:14px"><div style="font-size:1.1rem;font-weight:700;margin-bottom:6px">🥇 Campeón del Mundial</div><div class="tiny" style="color:var(--muted);margin-bottom:10px">Gestiona el pronóstico de campeón, bloqueo, revelación y estadísticas desde la pestaña dedicada.</div><button class="btn primary" onclick="go('champion')">Ir a pestaña Campeón 🏆</button></div>
  <div class="card"><h3 style="margin-top:0">Calendario oficial</h3><p class="tiny">Precarga los 72 partidos de la fase de grupos del Mundial 2026 con fecha y hora de <b>Chihuahua</b> (UTC-6). No duplica los ya cargados ni borra resultados. También puedes cargarlos manualmente desde la pestaña <b>Partidos</b>.</p><div style="height:8px"></div><button class="btn primary block" id="preload2026">📅 Precargar partidos oficiales (Mundial 2026)</button><div style="height:8px"></div><button class="btn gold block" id="blankStart">🧹 Dejar en blanco para empezar (borra pronósticos y resultados)</button><div style="height:8px"></div><button class="btn primary block" id="resetSeed">🚀 Borrar TODO y dejar solo los partidos (empezar de cero)</button></div>
  <div class="card"><h3 style="margin-top:0">Jugadores</h3><p class="tiny">Borra a los jugadores actuales y carga la lista oficial de ${PLAYERS_SEED.length} participantes con sus contraseñas. También puedes administrarlos uno por uno en la pestaña <b>Jugadores</b>.</p><div style="height:8px"></div><button class="btn primary block" id="seedPlayers">👥 Cargar lista oficial de jugadores</button></div>
  <div class="card"><h3 style="margin-top:0">Datos y respaldo</h3><p class="tiny">Toda la información vive en la nube (Google Sheets) y se comparte por el mismo enlace.</p>
   ${SHEET_URL?`<a class="btn block" href="${esc(SHEET_URL)}" target="_blank" rel="noopener">📊 Abrir Google Sheet</a><div style="height:8px"></div>`:`<p class="tiny" style="color:var(--muted)">Para mostrar un acceso directo al Google Sheet, pega su enlace en la constante <b>SHEET_URL</b> del código.</p>`}
   <button class="btn block" id="backup">📊 Exportar a Excel (.xlsx)</button>
   <div style="height:8px"></div><button class="btn block" id="refresh">🔄 Sincronizar ahora</button>
   <div style="height:8px"></div><button class="btn danger block" id="reset">🗑️ Borrar todo</button></div>
  <button class="btn ghost block" id="leave">Salir del modo administradora</button>
  <p class="tiny center">Quiniela Mundial 2026 · v2.0 (nube)</p>`;
 $("#prize").onchange=e=>{const v=parseInt(e.target.value,10)||0;state.prize=v;push("setConfig",{key:"prize",value:v});};
 $("#refresh").onclick=()=>bootstrap(true);
 const bk=$("#backup");if(bk)bk.onclick=()=>exportXlsx(bk);
 $("#reset").onclick=async()=>{if(confirm("¿Borrar TODO en la nube y empezar de cero? Esto afecta a todos los jugadores.")){const ok=await push("resetAll",{});if(ok)toast("Reiniciado.");}};
 {const pb=$("#preload2026");if(pb)pb.onclick=()=>preloadOfficialMatches(pb);}
 {const bs=$("#blankStart");if(bs)bs.onclick=()=>blankSlateForStart(bs);}
 {const rs=$("#resetSeed");if(rs)rs.onclick=()=>resetAndSeed(rs);}
 {const sp=$("#seedPlayers");if(sp)sp.onclick=()=>seedPlayers(sp);}
 $("#leave").onclick=()=>{resetSessionState();state.mode=null;state.me=null;state._auth="";state._mePass="";saveSession();render();bootstrap();};
}

async function init(){
  showLoading("Cargando quiniela…");
  try{
    const r=await api("bootstrap",{});
    if(r&&r.ok){ mergeShared(r.data); _lastRevealed=revealedIdSet(); _lastAwardsRevealed=awardsRevealedFlag(); _dataSig=dataSignature(); hideOffline(); }
    else{ toast((r&&r.error)||"Error al cargar.","err"); }
  }catch(e){ toast("Sin conexión con la nube. Reintenta.","err"); showOffline(); }
  hideLoading();
  render();
  setInterval(function(){ if(!document.hidden && API_URL && API_URL.indexOf("PEGA_AQUI")!==0 && !modal && !_pushBusy){ bootstrap({background:true}); } },25000);
}
init();
window.closeModal=closeModal;
</script>
</body>
</html>
